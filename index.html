
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1StopSoccerNews</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #0f172a;
  font-weight: bold;
}

.container {
  padding: 10px;
}

.match {
  background: #111827;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
}

.league {
  font-size: 12px;
  color: #9ca3af;
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 40%;
}

.team img {
  width: 22px;
  height: 22px;
}

.score {
  font-size: 20px;
  font-weight: bold;
}

.status {
  font-size: 12px;
  color: #22c55e;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>⚽ 1StopSoccerNews</header>

<div class="container" id="matches"></div>

<script>
const API_KEY = "    API-Football ";

async function loadMatches() {
  const today = new Date().toISOString().split("T")[0];
  const url = `https://v3.football.api-sports.io/fixtures?date=${today}`;

  const res = await fetch(url, {
    headers: { "x-apisports-key": API_KEY }
  });

  const data = await res.json();
  const matches = data.response;

  const container = document.getElementById("matches");
  container.innerHTML = "";

  if (!matches || matches.length === 0) {
    container.innerHTML = "<p>No matches today ⚽</p>";
    return;
  }

  matches.slice(0, 20).forEach(m => {
    const card = `
      <div class="match">
        <div class="league">${m.league.name}</div>

        <div class="row">
          <div class="team">
            <img src="${m.teams.home.logo}">
            <span>${m.teams.home.name}</span>
          </div>

          <div class="score">
            ${m.goals.home ?? 0} - ${m.goals.away ?? 0}
          </div>

          <div class="team" style="justify-content:flex-end;">
            <span>${m.teams.away.name}</span>
            <img src="${m.teams.away.logo}">
          </div>
        </div>

        <div class="status">
          ${m.fixture.status.short} • ${m.fixture.status.elapsed ?? ""}
        </div>
      </div>
    `;
    container.innerHTML += card;
  });
}

loadMatches();
setInterval(loadMatches, 60000);
</script>

</body>
</html>
