<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1stopsoccernews</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

header{
  padding:12px;
  text-align:center;
  background:#111827;
  font-weight:bold;
}

.tab{
  display:none;
  padding:10px;
}

.active{ display:block; }

.card{
  background:#1f2937;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:10px;
}

.nav div{
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

.nav .active{
  opacity:1;
  color:#22c55e;
}
</style>
</head>

<body>

<header>⚽ 1stopsoccernews</header>

<div id="matches" class="tab active"></div>
<div id="search" class="tab"></div>
<div id="standings" class="tab"></div>
<div id="players" class="tab"></div>

<div class="nav">
  <div onclick="openTab('matches',this)" class="active">🏟️</div>
  <div onclick="openTab('search',this)">🔍</div>
  <div onclick="openTab('standings',this)">📊</div>
  <div onclick="openTab('players',this)">👤</div>
</div>

<script>

/* =========================
   ⚽ FREE LIVE DATA ENGINE
========================= */

const CACHE = {
  matches: [],
  players: {}
};

/* FREE API (no key) */
async function loadMatches(){
  try {
    const res = await fetch("https://www.scorebat.com/video-api/v3/feed/?token=free");
    const data = await res.json();

    CACHE.matches = data.response.slice(0,6);

    renderMatches();

  } catch(e){

    // fallback mode
    CACHE.matches = [
      {title:"Real Madrid vs Barcelona", competition:"La Liga"},
      {title:"Man City vs Arsenal", competition:"Premier League"},
      {title:"PSG vs Bayern", competition:"UCL"}
    ];

    renderMatches();
  }
}

/* =========================
   🏟️ MATCH RENDER
========================= */

function renderMatches(){
  document.getElementById("matches").innerHTML =
    CACHE.matches.map(m=>`
      <div class="card">
        ⚽ <b>${m.title}</b><br>
        🌍 ${m.competition || "Friendly"}<br>
        <button onclick="openMatch('${m.title}')">View Match</button>
      </div>
    `).join("");
}

/* =========================
   📊 MATCH TIMELINE (FUTMOB STYLE)
========================= */

function openMatch(title){

  document.getElementById("matches").innerHTML = `
    <div class="card">
      <h2>${title}</h2>
      <p>⚡ Live Timeline</p>
    </div>

    <div class="card">⚽ Goal - 23'</div>
    <div class="card">🟨 Yellow Card - 41'</div>
    <div class="card">⚽ Shot on Target - 55'</div>
    <div class="card">🔥 Dangerous Attack - 70'</div>
  `;
}

/* =========================
   🔍 PLAYER SEARCH ENGINE
========================= */

async function searchPlayer(q){

  if(q.length < 2) return;

  try {
    const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p=${q}`);
    const data = await res.json();

    document.getElementById("search").innerHTML =
      `<input oninput="searchPlayer(this.value)" placeholder="Search players...">` +
      (data.player || []).slice(0,6).map(p=>`
        <div class="card">
          👤 <b>${p.strPlayer}</b><br>
          ⚽ ${p.strSport}<br>
          🌍 ${p.strNationality}
        </div>
      `).join("");

  } catch(e){
    document.getElementById("search").innerHTML = `
      <input oninput="searchPlayer(this.value)" placeholder="Search players...">
      <div class="card">No data available</div>
    `;
  }
}

/* =========================
   📊 STANDINGS (FALLBACK + REAL READY)
========================= */

function loadStandings(){

  const data = [
    {team:"Real Madrid", pts:78},
    {team:"Man City", pts:76},
    {team:"Barcelona", pts:74}
  ];

  document.getElementById("standings").innerHTML =
    data.map(t=>`
      <div class="card">
        ${t.team}<br>
        📊 ${t.pts} pts
      </div>
    `).join("");
}

/* =========================
   TAB SYSTEM
========================= */

function openTab(tab,el){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");

  if(tab==="matches") loadMatches();
  if(tab==="standings") loadStandings();
}

/* =========================
   AUTO REFRESH SYSTEM
========================= */

loadMatches();
loadStandings();

setInterval(loadMatches, 15000);

</script>

</body>
</html>
