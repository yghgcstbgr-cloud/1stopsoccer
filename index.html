<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1StopSoccerNews</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:white}

/* HEADER */
.topbar{
display:flex;align-items:center;gap:10px;
padding:12px;background:#0f172a;
position:sticky;top:0;z-index:1000;
}
.logo img{width:30px}

/* SEARCH */
input{
flex:1;padding:10px;border-radius:20px;border:none;
}

/* CARD */
.card{
background:#111827;
margin:10px;padding:12px;border-radius:12px;
}

/* MATCH */
.match{display:flex;justify-content:space-between;align-items:center}
.team{display:flex;align-items:center;gap:6px}
.team img{width:22px}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#0f172a;padding:14px 0;
}

/* ACTIVE */
.active{color:#22c55e}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
  </div>
  <input placeholder="Search players or teams..." oninput="search(this.value)">
</div>

<div id="app"></div>

<div class="nav">
  <div onclick="home()" class="active">🏠</div>
  <div onclick="live()">📡</div>
  <div onclick="news()">📰</div>
</div>

<script>

/* HOME */
function home(){
document.getElementById("app").innerHTML=`
<div class="card"><h3>Welcome to 1StopSoccerNews</h3></div>
`;
}

/* LIVE MATCHES (FREE SOURCE) */
async function live(){
const res = await fetch("https://www.scorebat.com/video-api/v3/");
const data = await res.json();

let html = `<div class="card"><h3>Live Matches</h3></div>`;

data.response.slice(0,10).forEach(m=>{
html+=`
<div class="card">
<b>${m.title}</b><br>
${m.competition}<br>
</div>
`;
});

document.getElementById("app").innerHTML = html;
}

/* NEWS (REAL RSS) */
async function news(){
const res = await fetch("https://api.allorigins.win/raw?url=https://www.espn.com/espn/rss/soccer/news");
const text = await res.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text,"text/xml");

let items = xml.querySelectorAll("item");

let html = `<div class="card"><h3>Latest News</h3></div>`;

items.forEach(i=>{
html+=`
<div class="card">
${i.querySelector("title").textContent}
</div>
`;
});

document.getElementById("app").innerHTML = html;
}

/* SEARCH */
function search(q){
if(q.length<2)return;

const sample = ["Mbappé","Haaland","Messi","Ronaldo","Bellingham"];

const results = sample.filter(p=>p.toLowerCase().includes(q.toLowerCase()));

document.getElementById("app").innerHTML =
results.map(r=>`<div class="card">${r}</div>`).join("");
}

/* INIT */
home();

</script>

</body>
</html>
