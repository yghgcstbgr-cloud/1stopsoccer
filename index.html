<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1StopSoccerNews</title>

<style>
body { margin:0; font-family:system-ui; background:#0b1220; color:white; }

header {
  padding:15px;
  text-align:center;
  background:#0f172a;
  font-weight:bold;
}

.topbar {
  display:flex;
  gap:10px;
  padding:10px;
}

select, button {
  padding:8px;
  border-radius:8px;
  border:none;
}

.container { padding:10px; }

.match {
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.score {
  text-align:center;
  font-size:20px;
  margin:5px 0;
}

.modal {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111827;
  padding:20px;
  border-radius:20px 20px 0 0;
  max-height:80%;
  overflow:auto;
  display:none;
}
</style>
</head>

<body>

<header>⚽ 1StopSoccerNews</header>

<div class="topbar">
  <select id="leagueFilter" onchange="loadMatches()">
    <option value="">All</option>
    <option value="39">Premier League</option>
    <option value="140">La Liga</option>
    <option value="135">Serie A</option>
    <option value="78">Bundesliga</option>
  </select>

  <button onclick="toggleFavorites()">⭐ Favorites</button>
</div>

<div id="matches" class="container"></div>
<div id="modal" class="modal"></div>

<script>
const API_KEY = "f48c2b32ba7f8a63fecc8cb926017919";

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let showFavs = false;

function toggleFavorites() {
  showFavs = !showFavs;
  loadMatches();
}

function toggleFav(team) {
  if (favorites.includes(team)) {
    favorites = favorites.filter(t => t !== team);
  } else {
    favorites.push(team);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  loadMatches();
}

async function loadMatches() {
  const today = new Date().toISOString().split("T")[0];
  const league = document.getElementById("leagueFilter").value;

  let url = `https://corsproxy.io/?https://v3.football.api-sports.io/fixtures?date=${today}`;
  if (league) url += `&league=${league}`;

  const res = await fetch(url, {
    headers: { "x-apisports-key": API_KEY }
  });

  const data = await res.json();
  const container = document.getElementById("matches");
  container.innerHTML = "";

  data.response.forEach(m => {

    if (showFavs) {
      if (!favorites.includes(m.teams.home.name) &&
          !favorites.includes(m.teams.away.name)) return;
    }

    const homeStar = favorites.includes(m.teams.home.name) ? "★" : "☆";
    const awayStar = favorites.includes(m.teams.away.name) ? "★" : "☆";

    container.innerHTML += `
      <div class="match" onclick="openMatch(${m.fixture.id})">
        <div onclick="event.stopPropagation();toggleFav('${m.teams.home.name}')">${homeStar} ${m.teams.home.name}</div>

        <div class="score">
          ${m.goals.home ?? "-"} - ${m.goals.away ?? "-"}
        </div>

        <div onclick="event.stopPropagation();toggleFav('${m.teams.away.name}')">
          ${m.teams.away.name} ${awayStar}
        </div>
      </div>
    `;
  });
}

// 🔥 MATCH DETAILS (events, lineups, stats)
async function openMatch(id) {

  const base = "https://corsproxy.io/?https://v3.football.api-sports.io";

  const [fixture, events, lineups, stats] = await Promise.all([
    fetch(`${base}/fixtures?id=${id}`, { headers:{ "x-apisports-key": API_KEY }}).then(r=>r.json()),
    fetch(`${base}/fixtures/events?fixture=${id}`, { headers:{ "x-apisports-key": API_KEY }}).then(r=>r.json()),
    fetch(`${base}/fixtures/lineups?fixture=${id}`, { headers:{ "x-apisports-key": API_KEY }}).then(r=>r.json()),
    fetch(`${base}/fixtures/statistics?fixture=${id}`, { headers:{ "x-apisports-key": API_KEY }}).then(r=>r.json())
  ]);

  const m = fixture.response[0];

  const modal = document.getElementById("modal");
  modal.style.display = "block";

  // 📝 EVENTS
  let eventsHTML = "<h3>Events</h3>";
  events.response.forEach(e => {
    eventsHTML += `<div>${e.time.elapsed}' - ${e.team.name}: ${e.type}</div>`;
  });

  // 📊 STATS
  let statsHTML = "<h3>Stats</h3>";
  if (stats.response.length) {
    stats.response[0].statistics.forEach(s => {
      statsHTML += `<div>${s.type}: ${s.value}</div>`;
    });
  }

  // 👥 LINEUPS
  let lineupHTML = "<h3>Lineups</h3>";
  lineups.response.forEach(l => {
    lineupHTML += `<div><b>${l.team.name}</b></div>`;
    l.startXI.forEach(p => {
      lineupHTML += `<div>${p.player.name}</div>`;
    });
  });

  // 🎥 HIGHLIGHTS (YouTube search embed)
  const video = `
    <h3>Highlights</h3>
    <iframe width="100%" height="200"
    src="https://www.youtube.com/embed?listType=search&list=${m.teams.home.name}+vs+${m.teams.away.name}+highlights"
    frameborder="0"></iframe>
  `;

  modal.innerHTML = `
    <h2>${m.teams.home.name} vs ${m.teams.away.name}</h2>
    <p>${m.fixture.status.long}</p>
    <p>${m.goals.home} - ${m.goals.away}</p>

    ${eventsHTML}
    ${statsHTML}
    ${lineupHTML}
    ${video}

    <button onclick="closeModal()">Close</button>
  `;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

loadMatches();
setInterval(loadMatches, 60000);
</script>

</body>
</html>
