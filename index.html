<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>God Sports App</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#050814;
  color:white;
}

header {
  padding:14px;
  text-align:center;
  font-weight:bold;
  background:#0f172a;
}

.tab {
  display:none;
  padding:10px;
}

.active { display:block; }

.card {
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.grid {
  display:grid;
  gap:10px;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#0f172a;
  padding:10px;
}

.nav div {
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

.nav .active {
  opacity:1;
  color:#22c55e;
}
</style>
</head>

<body>

<header>⚽ GOD OF SPORTS</header>

<!-- TABS -->
<div id="home" class="tab active"></div>
<div id="players" class="tab"></div>
<div id="standings" class="tab"></div>
<div id="news" class="tab"></div>

<!-- NAV -->
<div class="nav">
  <div onclick="openTab('home',this)" class="active">🏟️</div>
  <div onclick="openTab('players',this)">👤</div>
  <div onclick="openTab('standings',this)">📊</div>
  <div onclick="openTab('news',this)">📰</div>
</div>

<script>

/* =========================
   LOCAL GOD DATABASE (NO API)
========================= */

const DB = {
  matches: [
    {home:"Real Madrid",away:"Barcelona",score:"2-1",minute:78},
    {home:"Man City",away:"Arsenal",score:"1-1",minute:65},
    {home:"PSG",away:"Bayern",score:"3-2",minute:88}
  ],

  players: [
    {name:"Mbappé",team:"PSG",goals:5,assists:2},
    {name:"Haaland",team:"Man City",goals:8,assists:1},
    {name:"Vinicius",team:"Real Madrid",goals:4,assists:3}
  ],

  standings: [
    {team:"Real Madrid",pts:78},
    {team:"Man City",pts:76},
    {team:"Barcelona",pts:74}
  ],

  news: [
    "Mbappé linked with Real Madrid move",
    "Haaland breaks scoring record",
    "Arsenal fight for title race"
  ]
};

/* =========================
   TAB SYSTEM
========================= */

function openTab(tab,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");

  render();
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

  document.getElementById("home").innerHTML =
    DB.matches.map(m=>`
      <div class="card">
        <b>${m.home} vs ${m.away}</b><br>
        ⚽ ${m.score}<br>
        ⏱ ${m.minute}'
      </div>
    `).join("");

  document.getElementById("players").innerHTML =
    DB.players.map(p=>`
      <div class="card">
        <b>${p.name}</b><br>
        ${p.team}<br>
        ⚽ Goals: ${p.goals}<br>
        🎯 Assists: ${p.assists}
      </div>
    `).join("");

  document.getElementById("standings").innerHTML =
    DB.standings.map(s=>`
      <div class="card">
        ${s.team}<br>
        📊 ${s.pts} pts
      </div>
    `).join("");

  document.getElementById("news").innerHTML =
    DB.news.map(n=>`
      <div class="card">📰 ${n}</div>
    `).join("");
}

/* =========================
   LIVE SIMULATION ENGINE
========================= */

setInterval(()=>{

  // simulate live score updates
  DB.matches.forEach(m=>{
    if(Math.random()>0.7){
      m.minute++;
    }
  });

  render();

}, 5000);

/* INIT */
render();

</script>

</body>
</html>
